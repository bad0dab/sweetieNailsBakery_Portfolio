<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css" />

<div class="about-wrapper" id="about">
  <div class="about">
    <div class="about__visual">
      <div class="about__portrait">
        <div class="about__portrait-bg"></div>
        <div class="about__portrait-rings"></div>
        <div class="about__portrait-frame">
          <img class="about__portrait-img" src="https://s13.gifyu.com/images/bIh0e.gif" alt="Bri - Nail Artist" />
        </div>
      </div>
      <div class="about__badge">
        <span class="about__badge-num">N/A</span>
        <span class="about__badge-text">years of artistry</span>
      </div>
    </div>
    <div class="about__content">
      <p class="section-eyebrow">Who I am</p>
      <h2 class="section-title">
        <span class="about__greet">
          @for (g of [greeting()]; track g) {
          <span class="about__greet-word">{{ g }}</span>
          }
        </span>, I'm <em>Bri</em>
      </h2>
      <div class="about__text">
        <ul>

          <li>{{ age() }} years old</li>
          <li>Pusheen lover</li>
          <li style="display: flex; align-items: center; gap: 8px;">
            <span class="fi fi-pe"></span>
            <span class="fi fi-it"></span>

            <span class="fi fi-us"></span>
          </li>
        </ul>
      </div>
      <div class="about__stats">
        <div class="stat">
          <span class="stat__num">N/A</span>
          <span class="stat__label">Happy clients</span>
        </div>
        <div class="stat">
          <span class="stat__num">∞</span>
          <span class="stat__label">Design possibilities</span>
        </div>
        <div class="stat">
          <span class="stat__num">100%</span>
          <span class="stat__label">Cruelty-free products</span>
        </div>
      </div>
    </div>
  </div>
</div>
