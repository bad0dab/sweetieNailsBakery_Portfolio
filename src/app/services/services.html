<section class="services" id="services">
  <div class="services__inner">
    <div class="services__header">
      <p class="section-eyebrow">What I Offer</p>
      <h2 class="section-title">Services</h2>
    </div>
    <div class="services__grid">
      @for (s of services; track s.name) {
        <div class="service-card">
          <div class="service-card__top">
            <span class="service-card__icon">{{ s.icon }}</span>
            <span class="service-card__price">{{ s.price }}</span>
          </div>
          <h3 class="service-card__name">{{ s.name }}</h3>
          <p class="service-card__desc">{{ s.desc }}</p>
          <div class="service-card__footer">
            <span class="service-card__duration">⏱ {{ s.duration }}</span>
            <a href="#contact" class="service-card__link">Book →</a>
          </div>
        </div>
      }
    </div>
    <div class="services__cta">
      <a href="#contact" class="btn btn--primary">Book Your Appointment</a>
    </div>
  </div>
</section>
