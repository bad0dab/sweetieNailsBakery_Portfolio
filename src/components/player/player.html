<div class="player" [style.left.px]="posX" [style.bottom.px]="posY">
  <div class="player__yt"><div id="yt-player"></div></div>

  @if (minimized) {
    <div class="player__pill"
         (mousedown)="onDragStart($event)" (touchstart)="onDragStart($event)">
      <button class="player__btn player__btn--play" (click)="togglePlay()"
              [attr.aria-label]="playing ? 'Pause' : 'Play'">
        @if (playing) { ⏸ } @else { ▶ }
      </button>
      <button class="player__expand" (click)="toggleMinimize()" aria-label="Expand player">
        <span class="player__note" [class.spin]="playing">♫</span>
      </button>
    </div>
  } @else {
    <div class="player__body">
      <div class="player__head player__drag"
           (mousedown)="onDragStart($event)" (touchstart)="onDragStart($event)">
        <div class="player__meta">
          <span class="player__note" [class.spin]="playing">♫</span>
          <div class="player__text">
            <span class="player__title">{{ current.title }}</span>
            <span class="player__artist">{{ current.artist }}</span>
          </div>
        </div>
        <button class="player__min" (click)="toggleMinimize()" aria-label="Minimize player">–</button>
      </div>

      <div class="player__progress" (click)="seek($event)">
        <div class="player__progress-fill" [style.width.%]="progress"></div>
      </div>

      <div class="player__controls">
        <button class="player__btn" (click)="prev()" aria-label="Previous track">⏮</button>
        <button class="player__btn player__btn--play" (click)="togglePlay()"
                [attr.aria-label]="playing ? 'Pause' : 'Play'">
          @if (playing) { ⏸ } @else { ▶ }
        </button>
        <button class="player__btn" (click)="next()" aria-label="Next track">⏭</button>
      </div>

      <div class="player__volume">
        <span class="player__vol-icon">{{ volume === 0 ? '🔇' : '🔊' }}</span>
        <input class="player__vol-slider" type="range" min="0" max="100" step="1"
               [value]="volume" (input)="setVolume($event)" aria-label="Volume" />
      </div>
    </div>
  }
</div>
